<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabeza Connect - Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Tabeza Connect</h1>
            <p class="subtitle">Management Dashboard</p>
        </header>

        <nav class="navigation">
            <a href="/" class="nav-link active">Dashboard</a>
            <a href="/template.html" class="nav-link">Template Generator</a>
        </nav>

        <main class="main-content">
            <section class="status-section">
                <h2>Service Status</h2>
                <div class="status-card">
                    <div class="status-indicator-wrapper">
                        <div id="status-indicator" class="status-indicator status-grey"></div>
                        <span id="status-text" class="status-text">Checking...</span>
                    </div>
                </div>
            </section>

            <section class="stats-section">
                <h2>Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Jobs Processed</div>
                        <div id="job-count" class="stat-value">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Last Activity</div>
                        <div id="last-activity" class="stat-value">-</div>
                    </div>
                </div>
            </section>

            <section class="config-section">
                <h2>Configuration</h2>
                <div class="config-grid">
                    <div class="config-item">
                        <span class="config-label">Bar ID:</span>
                        <span id="bar-id" class="config-value">-</span>
                    </div>
                    <div class="config-item">
                        <span class="config-label">API URL:</span>
                        <span id="api-url" class="config-value">-</span>
                    </div>
                    <div class="config-item">
                        <span class="config-label">Watch Folder:</span>
                        <span id="watch-folder" class="config-value">-</span>
                    </div>
                </div>
            </section>

            <section class="template-section">
                <h2>Template Status</h2>
                <div class="template-card">
                    <div class="template-status">
                        <span class="template-label">Status:</span>
                        <span id="template-status" class="template-value">-</span>
                    </div>
                    <div class="template-version">
                        <span class="template-label">Version:</span>
                        <span id="template-version" class="template-value">-</span>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Tabeza Connect v1.7.0 | Auto-refresh: <span id="refresh-countdown">5</span>s</p>
        </footer>
    </div>

    <script src="/js/dashboard.js"></script>
</body>
</html>
